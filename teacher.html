  {name:"鲁甸县龙头山镇光明小学", region:"云南·昭通", teacher:""},

  // 四川·阿坝

  // 广东·清远
  {name:"连南瑶族自治县民族小学", region:"广东·清远", teacher:""},
  // 广东·汕尾

  // 广东·深汕

// ===== Init =====
(function(){
  var sel = document.getElementById('schoolName');

// ===== XHR wrapper (more reliable than fetch for large payloads) =====
function api(method, path, body, timeoutSec) {
  timeoutSec = timeoutSec || 60;
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open(method, API + path, true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.timeout = timeoutSec * 1000;
    
    xhr.onload = function() {
      try {
        var data = JSON.parse(xhr.responseText);
        if (data.success) resolve(data);
        else reject(new Error(data.message || ('HTTP ' + xhr.status)));
      } catch(e) {
        reject(new Error('响应解析失败 (status=' + xhr.status + ')'));
      }
    };
    
    xhr.onerror = function() {
      reject(new Error('网络连接失败，请检查网络后重试'));
    };
    
    xhr.ontimeout = function() {
      reject(new Error('上传超时（' + timeoutSec + '秒），文件可能较大，请重试'));
    };
    
    xhr.send(body ? JSON.stringify(body) : null);
  });
}

// ===== File reading =====
function readFileAsDataURL(file) {
  return new Promise(function(ok, fail) {
    var r = new FileReader();
    r.onload = function(e) { ok(e.target.result); };
    r.onerror = function() { fail(new Error('文件读取失败')); };
    r.readAsDataURL(file);
  });
}

function readChunkAsDataURL(file, start, len) {
  return new Promise(function(ok, fail) {
    var sl = file.slice(start, start + len);
    var r = new FileReader();
    r.onload = function(e) { ok(e.target.result); };
    r.onerror = function() { fail(new Error('分块读取失败')); };
    r.readAsDataURL(sl);
  });
}

// ===== Upload logic =====
// Direct upload (for small files <= 2MB)
async function uploadDirect(file) {
  var sz = (file.size/1024/1024).toFixed(1);
  setProgress('正在上传 ' + file.name + ' (' + sz + 'MB)...', 5);
  var b64 = await readFileAsDataURL(file);
  var d = await api('POST', '/api/upload-file', { fileName: file.name, fileData: b64 }, 120);
  return d.file;
}

// Chunked upload (for large files > 2MB)
async function uploadChunked(file) {
  var totalChunks = Math.ceil(file.size / CHUNK_SIZE);
  var sz = (file.size/1024/1024).toFixed(1);
  setProgress('准备分块上传 ' + file.name + ' (' + sz + 'MB)...', 2);

  // Start session
  var s = await api('POST', '/api/chunked-upload/start', {
    fileName: file.name,
    totalChunks: totalChunks
  }, 30);
  var sid = s.sessionId;

  // Upload each chunk
  for (var i = 0; i < totalChunks; i++) {
    var pct = 2 + Math.round((i / totalChunks) * 80);
    setProgress('正在上传 ' + file.name + ' 第 ' + (i+1) + '/' + totalChunks + ' 块...', pct);
    
    var b64 = await readChunkAsDataURL(file, i * CHUNK_SIZE, CHUNK_SIZE);
    
    for (var retry = 0; retry < 3; retry++) {
      try {
        await api('POST', '/api/chunked-upload/chunk', {
          sessionId: sid,
          chunkIndex: i,
          data: b64
        }, 60);
        break;
      } catch(e) {
        if (retry === 2) throw e;
        setProgress('重试第 ' + (i+1) + ' 块 (' + (retry+2) + '/3)...', pct);
        await new Promise(function(r){setTimeout(r, 1000)});
      }
    }
  }

  // Complete
  setProgress('正在保存 ' + file.name + '...', 90);
  var c = await api('POST', '/api/chunked-upload/complete', { sessionId: sid }, 120);
  return c.file;
}

// Auto-select upload method
async function uploadFile(file) {
  if (file.size <= DIRECT_MAX) {
    return await uploadDirect(file);
  } else {
    return await uploadChunked(file);
  }
}

// ===== Photo UI =====
var photoFiles = [];
var pInput = document.getElementById('photoInput');
var pPrev  = document.getElementById('photoPreview');
var pArea  = document.getElementById('photoUploadArea');

pInput.addEventListener('change', function(e){ addPhotos(Array.from(e.target.files)); });
pArea.addEventListener('dragover', function(e){ e.preventDefault(); pArea.classList.add('dragover'); });
pArea.addEventListener('dragleave', function(){ pArea.classList.remove('dragover'); });
pArea.addEventListener('drop', function(e){
  e.preventDefault(); pArea.classList.remove('dragover');
  addPhotos(Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('image/')}));
});

function addPhotos(files) {
  var left = 9 - photoFiles.length;
  if (left <= 0) { toast('最多上传9张照片'); return; }
  for (var i = 0; i < Math.min(files.length, left); i++) {
    if (files[i].size > 20*1024*1024) { toast('单张照片不超过20MB'); continue; }
    photoFiles.push(files[i]);
  }
  renderPhotos();
}

function removePhoto(i) { photoFiles.splice(i, 1); renderPhotos(); }

function renderPhotos() {
  pPrev.innerHTML = '';
  photoFiles.forEach(function(f, i) {
    var d = document.createElement('div'); d.className = 'preview-item';
    d.innerHTML = '<img src="' + URL.createObjectURL(f) + '"><button class="remove-btn" onclick="removePhoto('+i+')">\u00d7</button>';
    pPrev.appendChild(d);
  });
}

// ===== Video UI =====

var vInput = document.getElementById('videoInput');
var vArea  = document.getElementById('videoUploadArea');
var vPrev  = document.getElementById('videoPreview');

vInput.addEventListener('change', function(e){ if(e.target.files[0]) addVideo(e.target.files[0]); });

vArea.addEventListener('dragleave', function(){ vArea.classList.remove('dragover'); });
vArea.addEventListener('drop', function(e){
  e.preventDefault(); vArea.classList.remove('dragover');
  var fs = Array.from(e.dataTransfer.files).filter(function(f){return f.type.startsWith('video/')});
  if (fs[0]) addVideo(fs[0]);
});

function addVideo(f) {
  if (f.size > 200*1024*1024) { toast('视频不超过200MB，建议使用链接'); return; }
  videoFile = f;
  vArea.style.display = 'none';
  vPrev.style.display = 'flex';
  document.getElementById('videoFileName').textContent = f.name;
  document.getElementById('videoFileSize').textContent = (f.size/1024/1024).toFixed(1) + ' MB';
  document.getElementById('videoLink').value = '';
}

function removeVideo() {
  videoFile = null;
  vArea.style.display = '';
  vPrev.style.display = 'none';
  vInput.value = '';
}

// ===== State =====
var selectedCategory = '';

document.getElementById('categoryGrid').addEventListener('click', function(e){
  var btn = e.target.closest('.category-btn');
  if (!btn) return;
  document.querySelectorAll('.category-btn').forEach(function(b){b.classList.remove('selected')});
  btn.classList.add('selected');
  selectedCategory = btn.dataset.cat;
});

// ===== Submit =====
async function doSubmit() {
  var school  = document.getElementById('schoolName').value;
  var teacher = document.getElementById('teacherName').value.trim();
  var date    = document.getElementById('activityDate').value;
  var desc    = document.getElementById('activityDesc').value.trim();
  var vlink   = document.getElementById('videoLink').value.trim();

  if (!school)  return toast('请选择学校');
  if (!teacher) return toast('请输入姓名');
  if (!selectedCategory) return toast('请选择类别');
  if (!date)    return toast('请选择日期');
  if (!desc)    return toast('请输入活动描述');
  if (!photoFiles.length && !videoFile && !vlink) return toast('请至少上传照片或视频');

  btnState(true);
  showProgress();

  var photos = [], video = null;

  try {
    // Upload photos
    for (var i = 0; i < photoFiles.length; i++) {
      setProgress('正在上传第 ' + (i+1) + ' 张照片...', 5 + Math.round((i/photoFiles.length) * 25));
      var r = await uploadFile(photoFiles[i]);
      photos.push({ name: r.name, fileID: r.fileID, url: r.url });
    }

    // Upload video
    if (videoFile) {
      var v = await uploadFile(videoFile);
      video = { name: v.name, fileID: v.fileID, url: v.url };
      setProgress('视频上传完成!', 85);
    }

    // Save metadata
    setProgress('正在保存信息...', 92);
    await api('POST', '/api/submissions', {
      schoolName: school + '|' + teacher,
      teacherName: teacher,
      category: selectedCategory,
      activityDate: date,
      activityDesc: desc,
      videoLink: vlink,
      photos: photos,
      video: video
    }, 30);

    setProgress('上传完成!', 100);
    setTimeout(function(){
      document.getElementById('successModal').classList.add('active');
      resetUI();
    }, 400);

  } catch(e) {
    console.error('Upload error:', e);
    toast('上传失败：' + (e.message || '未知错误'));
    resetUI();
  }
}

function resetForm() {
  document.getElementById('successModal').classList.remove('active');
  document.getElementById('uploadForm').reset();
  document.getElementById('activityDate').valueAsDate = new Date();
  document.querySelectorAll('.category-btn').forEach(function(b){b.classList.remove('selected')});
  selectedCategory = '';
  photoFiles = [];
  pPrev.innerHTML = '';
  removeVideo();
  resetUI();
}

// ===== UI helpers =====
function btnState(disabled) {
  var btn = document.getElementById('submitBtn');
  btn.disabled = disabled;
  btn.textContent = disabled ? '上传中...' : '✨ 提交分享';
}

function showProgress() {
  document.getElementById('progressBar').classList.add('active');
}

function hideProgress() {
  document.getElementById('progressBar').classList.remove('active');
}

function setProgress(text, pct) {
  document.getElementById('progressText').textContent = text;
  document.getElementById('progressFill').style.width = pct + '%';
}

function resetUI() {
  btnState(false);
  hideProgress();
  setProgress('', 0);
}

function toast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3500);
}

// ===== Floating notes =====
(function(){
  var nts = ['\u266a','\u266b','\u266c','\u2669','\ud83c\udfb5','\ud83c\udfb6'];
  var c = document.getElementById('musicNotes');
  function mk() {
    var n = document.createElement('div'); n.className = 'note';
    n.textContent = nts[Math.floor(Math.random()*nts.length)];
    n.style.left = Math.random()*100+'%';
    n.style.fontSize = (16+Math.random()*24)+'px';
    n.style.animationDuration = (8+Math.random()*12)+'s';
    n.style.setProperty('animation-delay', Math.random()*5+'s');
    c.appendChild(n);
    setTimeout(function(){n.remove()}, 25000);
  }
  for (var i=0;i<12;i++) setTimeout(mk, i*800);
  setInterval(mk, 3000);
})();
</script>
